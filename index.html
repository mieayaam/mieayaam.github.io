<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Pyary Malaysia | Tiktok | Linktree</title>
    <link rel="icon" href="images/logo_web.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="top-actions">
            <button class="icon-btn" aria-label="Linktree logo">
                <img src="images/linktree.png" alt="Linktree Logo" style="width:15px;height:28px;object-fit:contain;" />
            </button>
            <button class="icon-btn" aria-label="Share"><i class="fa-solid fa-arrow-up-from-bracket"></i></button>
        </div>

        <header class="profile">
            <div class="profile-img">
                <img src="images/pyary_logo.png" alt="" onerror="this.style.display='none'">
            </div>
            <h1 class="profile-title">Official Pyary Malaysia</h1>
            <p class="profile-bio">Your Everyday Herbal Whitening Soap for<br>Healthier Skin #REVEALYOURTRUESKIN</p>
            <div class="social-links">
                <a href="#" class="social-icon" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
            </div>
        </header>

        <main class="links">
            <a href="#" class="link-card">
                <div class="link-card-logo">
                    <img src="images/pyary_logo.png" alt="" onerror="this.style.display='none'">
                </div>
                <div class="link-card-title">Join TikTok Affiliate</div>
                <div class="link-card-menu"><i class="fa-solid fa-ellipsis-vertical"></i></div>
            </a>

            <div class="large-card large-card-affiliate">
                <div class="large-card-img framed-img">
                    <img src="images/card1.png" alt="Nalpamara Malaysia Affiliate Program">
                </div>
                <div class="large-card-content">
                    <div class="large-card-subtitle">TikTok Affiliate Program Offering Details <span class="card-dots"><i class="fa-solid fa-ellipsis-vertical"></i></span></div>
                </div>
            </div>

            <div class="large-card tiktok-card">
                <div class="large-card-img tiktok-preview">
                    <img src="images/card2.png" alt="TikTok Video Preview">
                </div>
                <div class="large-card-content center-content">
                    <div class="large-card-title tiktok-title">Order on TikTok Shop!</div>
                    <div class="large-card-subtitle"><i class="fa-brands fa-tiktok"></i> Pyary by Fortis • 3.7K Followers</div>
                    <button class="follow-btn">Follow</button>
                    <div class="card-menu-absolute"><i class="fa-solid fa-ellipsis-vertical"></i></div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <a href="#" class="join-btn">Join pyary.my on Linktree</a>
            <div class="legal-links">
                <a href="#">Cookie Preferences</a> • 
                <a href="#">Report</a> • 
                <a href="#">Privacy</a>
            </div>
        </footer>
    </div>
</body>
</html>
